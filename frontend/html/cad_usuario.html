<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/cad_usuario.js" defer></script>
    <title>Sistema do Usuário</title>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html">Principal</a>
            <a href="./cad_usuario.html">Cadastrar Usuários</a>
            <a href="./list_usuarios.html">Listar Usuários</a>
        </nav>
    </header>
    <main>
        <h1>Cadastro de Usuário</h1>
        <br>
        <form>
            <label for="nome">Nome do usuário:</label><br>
            <input type="text" id="nome"><br><br>
            <label for="email">Email do usuário:</label><br>
            <input type="text" id="email"><br><br>
            <label for="peso">Peso do usuário:</label><br>
            <input type="text" id="peso"><br><br>
            <label for="altura">Altura do usuário:</label><br>
            <input type="text" id="altura"><br><br>
            <button id="btn_cad_usuario">Cadastrar</button><br><br>
        </form>
        <div id="resposta"></div>
    </main>
